jobs: 4

matrix:
- name: Markdown
  expect_match: false
  apsell:
    mode: en
  pipeline:
  - pyspelling.filters.markdown:
      markdown_extensions:
      - markdown.extensions.extra:
  - pyspelling.filters.html:
      comments: true
      attributes:
      - title
      - alt
      ignores:
      - ':matches(code, pre)'
      - 'code'
      - 'pre'
  sources:
  - '_posts/**/*.md|_tabs/**/*.md'
